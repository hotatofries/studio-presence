<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Presence — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:   #F3EDE2;
  --surface: #1A0C00;
  --gold:    #D99F18;
  --show:    #C9920C;
  --stage:   #3B6088;
  --sphere:  #2D6A4F;
  --ink:     #2A1800;
  --muted:   #8C7B6B;
  --rule:    rgba(42,24,0,.1);
  --sidebar: 210px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { display: flex; min-height: 100vh; background: var(--paper); color: var(--ink); font-family: 'DM Mono', monospace; }

/* ── Sidebar ── */
.sidebar { width: var(--sidebar); min-height: 100vh; background: var(--surface); display: flex; flex-direction: column; padding: 28px 0 24px; position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; }
.sidebar__logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600; color: var(--gold); letter-spacing: .03em; padding: 0 20px 22px; border-bottom: 1px solid rgba(255,255,255,.07); margin-bottom: 10px; }
.sidebar__logo span { display: block; font-size: .6rem; font-family: 'DM Mono', monospace; font-weight: 300; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.28); margin-top: 3px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 20px; color: rgba(255,255,255,.45); font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: color .14s, background .14s; user-select: none; border-left: 2px solid transparent; }
.nav-item:hover { color: rgba(255,255,255,.75); background: rgba(255,255,255,.04); }
.nav-item.active { color: #fff; background: rgba(255,255,255,.06); }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.2); flex-shrink: 0; transition: background .14s; }
.nav-item.active .nav-dot { background: var(--gold); }
.nav-item[data-view="dashboard"].active { border-left-color: var(--gold); }
.nav-item[data-view="show"].active   { border-left-color: var(--show);   }
.nav-item[data-view="show"].active   .nav-dot { background: var(--show);   }
.nav-item[data-view="stage"].active  { border-left-color: var(--stage);  }
.nav-item[data-view="stage"].active  .nav-dot { background: var(--stage);  }
.nav-item[data-view="sphere"].active { border-left-color: var(--sphere); }
.nav-item[data-view="sphere"].active .nav-dot { background: var(--sphere); }
.nav-divider { height: 1px; background: rgba(255,255,255,.07); margin: 10px 20px; }
.nav-pct { margin-left: auto; font-size: .62rem; color: rgba(255,255,255,.28); letter-spacing: 0; text-transform: none; display: flex; align-items: center; gap: 6px; }
.nav-pct .dri-avatar-wrap img { border-radius: 50%; opacity: .75; }
.nav-pct .dri-initials-pill { opacity: .75; }

/* ── Main ── */
.main { flex: 1; padding: 44px 52px; max-width: 800px; }
.main--wide { max-width: 1140px; }
.page-header { margin-bottom: 36px; }
.page-header__eyebrow { font-size: .62rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.page-header__title { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 500; line-height: 1.05; color: var(--surface); }
.page-header__sub { margin-top: 8px; font-size: .76rem; color: var(--muted); line-height: 1.6; max-width: 480px; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 72px 24px; color: var(--muted); }
.empty-state__glyph { font-size: 1.8rem; opacity: .25; margin-bottom: 18px; font-family: 'Cormorant Garamond', serif; }
.empty-state__title { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; color: var(--ink); margin-bottom: 8px; font-weight: 500; }
.empty-state__body { font-size: .75rem; line-height: 1.7; }

/* ── AI Summary card ── */
.summary-card {
  background: rgba(42,24,0,.03);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 36px;
  position: relative;
}
.summary-card__header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.summary-card__label { font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
.summary-card__spark { font-size: .7rem; }
.summary-card__actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.summary-btn {
  background: none; border: 1px solid var(--rule); border-radius: 6px;
  padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: .65rem;
  color: var(--muted); cursor: pointer; transition: all .13s; letter-spacing: .04em;
}
.summary-btn:hover { border-color: var(--gold); color: var(--ink); }
.summary-btn.primary { background: var(--surface); color: var(--gold); border-color: var(--surface); }
.summary-btn.primary:hover { opacity: .8; }
.summary-btn:disabled { opacity: .4; cursor: default; }
.summary-text {
  font-size: .8rem; line-height: 1.8; color: var(--ink);
  font-family: 'Cormorant Garamond', serif; font-size: 1rem;
}
.summary-text.loading { color: var(--muted); font-family: 'DM Mono', monospace; font-size: .75rem; font-style: italic; }
.summary-meta { margin-top: 10px; font-size: .62rem; color: var(--muted); }
.summary-key-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--rule); }
.summary-key-input {
  flex: 1; background: rgba(42,24,0,.04); border: 1px solid var(--rule); border-radius: 6px;
  padding: 6px 10px; font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--ink);
  outline: none;
}
.summary-key-input:focus { border-color: var(--gold); }
.summary-key-input::placeholder { color: var(--muted); }

/* ── Month section ── */
.month-section { margin-bottom: 44px; }
.month-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--rule); }
.month-header__name { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 500; color: var(--surface); }
.month-header__count { font-size: .65rem; color: var(--muted); letter-spacing: .05em; flex: 1; }
.pbar-wrap { display: flex; align-items: center; gap: 8px; }
.pbar { width: 72px; height: 3px; background: var(--rule); border-radius: 2px; overflow: hidden; }
.pbar__fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .3s; }
.month-header__pct { font-size: .7rem; color: var(--ink); font-weight: 500; min-width: 32px; text-align: right; }

/* ── Dim group ── */
.dim-group { margin-bottom: 10px; border-left: 2px solid transparent; padding-left: 8px; }
.dim-group__label { font-size: .59rem; letter-spacing: .16em; text-transform: uppercase; font-weight: 500; padding: 0 2px 5px; }
.dim-group--show   { border-left-color: var(--show); }
.dim-group--show   .dim-group__label { color: var(--show); }
.dim-group--stage  { border-left-color: var(--stage); }
.dim-group--stage  .dim-group__label { color: var(--stage); }
.dim-group--sphere { border-left-color: var(--sphere); }
.dim-group--sphere .dim-group__label { color: var(--sphere); }

/* ── Milestone row ── */
.ms-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; transition: background .1s; }
.ms-row:hover { background: rgba(42,24,0,.04); }
.ms-row:hover .ms-delete { color: var(--muted); }
.ms-circle { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid rgba(42,24,0,.25); background: none; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .58rem; color: transparent; transition: all .15s; cursor: pointer; user-select: none; }
.ms-circle:hover { border-color: var(--dim-c, var(--gold)); }
.ms-row.p-doing .ms-circle { border-color: var(--dim-c, var(--gold)); box-shadow: 0 0 0 3px rgba(42,24,0,.1); }
.ms-row.p-done  .ms-circle { background: var(--dim-c, var(--sphere)); border-color: var(--dim-c, var(--sphere)); color: #fff; }
.ms-row.p-done  .ms-circle:hover { opacity: .7; }
.ms-row.p-done  .ms-label { opacity: .4; text-decoration: line-through; }
.ms-label { flex: 1; font-size: .78rem; line-height: 1.45; color: var(--ink); outline: none; }
.ms-label.editable { cursor: text; }
.ms-label.is-editing { background: rgba(217,159,24,.08); border-radius: 3px; padding: 1px 4px; }
.ms-date-tag { font-size: .62rem; color: var(--muted); white-space: nowrap; letter-spacing: .03em; }
.ms-area-tag { font-size: .6rem; color: var(--muted); background: rgba(42,24,0,.06); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.ms-progress { display: inline-flex; align-items: center; font-size: .62rem; padding: 2px 8px; border-radius: 10px; cursor: pointer; user-select: none; transition: opacity .12s; white-space: nowrap; min-width: 40px; justify-content: center; border: 1px solid transparent; }
.ms-progress:hover { opacity: .7; }
.ms-progress.p-zero  { color: var(--muted);  background: rgba(42,24,0,.06);    border-color: rgba(42,24,0,.1); }
.ms-progress.p-doing { color: #92650a;        background: rgba(217,159,24,.12); border-color: rgba(217,159,24,.25); }
.ms-progress.p-done  { color: #1e5e3a;        background: rgba(45,106,79,.12);  border-color: rgba(45,106,79,.25); }
.ms-progress-input { width: 52px; font-size: .62rem; font-family: 'DM Mono', monospace; color: var(--ink); background: rgba(42,24,0,.04); border: 1px solid var(--gold); border-radius: 10px; padding: 2px 8px; text-align: center; outline: none; }
.ms-delete { background: none; border: none; color: transparent; cursor: pointer; font-size: .68rem; padding: 2px 3px; transition: color .12s; flex-shrink: 0; line-height: 1; }
.ms-delete:hover { color: #b03030 !important; }

/* ── Milestone output section ── */
.ms-output-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; flex-shrink: 0; display: flex; align-items: center; gap: 3px; line-height: 1; color: transparent; transition: color .12s; }
.ms-row:hover .ms-output-btn { color: var(--muted); }
.ms-output-btn.has-outputs { color: var(--gold) !important; }
.ms-output-btn .ms-output-count { font-size: .56rem; }
.ms-output-section { display: none; padding: 2px 10px 12px 37px; }
.ms-output-section.open { display: block; }
.ms-output-section-lbl { font-size: .54rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; opacity: .65; }
.ms-output-thumbs { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.ms-output-thumb-wrap { position: relative; flex-shrink: 0; }
.ms-output-thumb { width: 88px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid var(--rule); cursor: pointer; display: block; transition: opacity .12s; }
.ms-output-thumb:hover { opacity: .8; }
.ms-output-remove { position: absolute; top: -5px; right: -5px; width: 16px; height: 16px; border-radius: 50%; background: #b03030; color: #fff; border: none; cursor: pointer; font-size: .48rem; display: none; align-items: center; justify-content: center; }
.ms-output-thumb-wrap:hover .ms-output-remove { display: flex; }
.ms-output-attach { display: inline-flex; align-items: center; gap: 5px; font-size: .65rem; color: var(--muted); background: none; border: 1.5px dashed var(--rule); border-radius: 6px; padding: 6px 12px; cursor: pointer; transition: border-color .13s, color .13s; }
.ms-output-attach:hover { border-color: var(--gold); color: var(--gold); }

/* ── Output lightbox ── */
#output-lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 10000; align-items: center; justify-content: center; cursor: zoom-out; }
#output-lightbox.open { display: flex; }
#output-lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 8px; object-fit: contain; box-shadow: 0 4px 40px rgba(0,0,0,.5); cursor: default; }
#output-lightbox-close { position: absolute; top: 18px; right: 22px; color: rgba(255,255,255,.7); font-size: 1.3rem; cursor: pointer; background: none; border: none; padding: 6px; transition: color .12s; }
#output-lightbox-close:hover { color: #fff; }

/* ── V-Team overview ── */
.people-table { border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; background-image: linear-gradient(to right, transparent 68px, rgba(42,24,0,.1) 68px, rgba(42,24,0,.1) 71px, transparent 71px); }
.people-table__head,
.people-table__row { display: grid; grid-template-columns: 68px 195px 160px 1fr 210px 148px; }
.people-table__head { background: rgba(42,24,0,.03); border-bottom: 1px solid var(--rule); }
.people-table__row { border-bottom: 1px solid var(--rule); align-items: start; }
.people-table__row:last-child { border-bottom: none; }
.people-col { padding: 16px 18px; font-size: .7rem; }
.people-table__head .people-col { padding: 11px 18px; font-size: .57rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.people-col--dim { display: flex; align-items: flex-start; justify-content: flex-end; padding: 16px 12px 16px 10px; }
.people-col--area { border-right: 1px solid var(--rule); }
.people-col--dri { border-right: 1px solid var(--rule); padding-top: 14px; }
.people-col--mission { border-right: 1px solid var(--rule); }
.people-col--done { border-right: 1px solid var(--rule); }
.people-col--output { padding: 16px 18px; }
.people-dim-badge { font-size: .62rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding-top: 4px; }
.people-area-name { font-size: .76rem; color: var(--ink); font-weight: 500; line-height: 1.45; }
.people-mission-wrap { position: relative; }
.people-mission-edit { font-size: .69rem; color: var(--ink); line-height: 1.6; outline: none; border-radius: 4px; padding: 2px 5px; margin: -2px -5px; transition: background .1s; cursor: text; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.people-mission-edit.is-default { color: var(--muted); }
.people-mission-edit:focus { -webkit-line-clamp: unset; overflow: visible; background: rgba(217,159,24,.07); color: var(--ink); }
.people-mission-edit:empty::before { content: attr(data-placeholder); opacity: .35; }
.people-mission-pencil { position: absolute; top: 0; right: -2px; background: none; border: none; cursor: pointer; color: transparent; padding: 3px; line-height: 1; transition: color .12s; }
.people-mission-wrap:hover .people-mission-pencil { color: var(--muted); }
.people-mission-pencil:hover { color: var(--gold) !important; }
.people-mission-add { display: inline-flex; align-items: center; gap: 4px; margin-top: 7px; font-size: .62rem; color: var(--gold); background: none; border: 1px dashed rgba(217,159,24,.4); border-radius: 5px; padding: 3px 9px; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: .04em; transition: border-color .13s, opacity .12s; }
.people-mission-add:hover { border-color: var(--gold); opacity: .8; }
.people-done-item { display: flex; align-items: baseline; gap: 7px; padding: 3px 0; }
.people-done-check { flex-shrink: 0; color: var(--sphere); position: relative; top: 1px; }
.people-done-lbl { font-size: .71rem; color: var(--ink); line-height: 1.4; }
.people-outputs { display: flex; flex-wrap: wrap; gap: 7px; }
.people-output-thumb { width: 58px; height: 44px; object-fit: cover; border-radius: 5px; border: 1px solid var(--rule); cursor: pointer; transition: opacity .12s; display: block; }
.people-output-thumb:hover { opacity: .8; }
.people-empty { font-size: .69rem; color: var(--muted); opacity: .38; }

/* ── Dim page header ── */
.dim-page-header { display: flex; align-items: stretch; gap: 18px; margin-bottom: 32px; padding-bottom: 28px; border-bottom: 1px solid var(--rule); }
.dim-accent { width: 4px; border-radius: 2px; flex-shrink: 0; }
.dim-header-body { flex: 1; }
.dim-header-name { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 500; color: var(--surface); line-height: 1; margin-bottom: 4px; }
.dim-header-sub { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.dim-header-mission { font-size: .8rem; color: var(--muted); line-height: 1.65; max-width: 500px; }
.dim-header-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.dim-header-stat { font-size: .65rem; color: var(--muted); letter-spacing: .04em; }

/* ── Output card ── */
.output-card { border: 1px solid var(--rule); border-radius: 10px; margin-bottom: 18px; overflow: hidden; }
.output-card__head { display: flex; align-items: center; gap: 12px; padding: 13px 18px 11px; background: rgba(42,24,0,.018); border-bottom: 1px solid var(--rule); }
.output-card__title-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.output-card__title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 500; color: var(--surface); }
.output-card__head-bar { display: flex; align-items: center; gap: 7px; }
.head-pbar { width: 64px; height: 3px; background: var(--rule); border-radius: 2px; overflow: hidden; }
.head-pbar__fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .3s; }
.head-pbar-pct { font-size: .6rem; color: var(--muted); }
.output-section-label { font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); padding: 12px 18px 5px; }
.output-mission { font-size: .76rem; color: var(--muted); line-height: 1.65; padding: 0 18px 14px; outline: none; cursor: text; border-bottom: 1px solid var(--rule); transition: background .1s; min-height: 20px; }
.output-mission:hover { background: rgba(217,159,24,.04); }
.output-mission:focus { background: rgba(217,159,24,.07); color: var(--ink); }
.output-mission:empty::before { content: attr(data-placeholder); opacity: .45; }
.output-milestones { padding: 4px 0 0; }
.output-add { padding: 8px 18px 14px; }

/* ── Mission edit actions ── */
.mission-actions { display: none; align-items: center; gap: 6px; padding: 0 18px 12px; }
.mission-actions.visible { display: flex; }
.btn-mission-save { background: var(--surface); color: var(--gold); border: none; border-radius: 6px; padding: 5px 13px; font-family: 'DM Mono', monospace; font-size: .68rem; letter-spacing: .06em; cursor: pointer; transition: opacity .13s; }
.btn-mission-save:hover { opacity: .8; }
.btn-mission-discard { background: none; color: var(--muted); border: 1px solid var(--rule); border-radius: 6px; padding: 5px 11px; font-family: 'DM Mono', monospace; font-size: .68rem; cursor: pointer; transition: color .13s; }
.btn-mission-discard:hover { color: var(--ink); }

/* ── Custom card delete ── */
.output-card__head-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.output-card__del-btn { opacity: 0; transition: opacity .13s; background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px 8px; border-radius: 5px; display: flex; align-items: center; gap: 4px; font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .03em; }
.output-card:hover .output-card__del-btn { opacity: 1; }
.output-card__del-btn:hover { color: #b03030; background: rgba(176,48,48,.07); }
.output-card__confirm-bar { display: none; align-items: center; gap: 10px; padding: 11px 18px; border-top: 1px solid rgba(176,48,48,.14); background: rgba(176,48,48,.03); font-size: .72rem; color: var(--muted); }
.output-card__confirm-bar.visible { display: flex; }
.btn-confirm-del { background: #b03030; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: .69rem; cursor: pointer; transition: opacity .13s; }
.btn-confirm-del:hover { opacity: .82; }
.btn-keep { background: none; color: var(--muted); border: 1px solid var(--rule); border-radius: 6px; padding: 6px 12px; font-family: 'DM Mono', monospace; font-size: .69rem; cursor: pointer; transition: color .13s; }
.btn-keep:hover { color: var(--ink); }

/* ── Add milestone form ── */
.add-ms-btn { display: inline-flex; align-items: center; gap: 6px; font-size: .7rem; color: var(--muted); cursor: pointer; background: none; border: none; padding: 4px 0; font-family: 'DM Mono', monospace; letter-spacing: .05em; transition: color .13s; }
.add-ms-btn:hover { color: var(--gold); }
.add-ms-form { display: none; align-items: center; gap: 8px; padding: 10px 0 4px; flex-wrap: wrap; }
.add-ms-form.visible { display: flex; }
.fi-text { flex: 1; min-width: 180px; background: rgba(42,24,0,.04); border: 1px solid var(--rule); border-radius: 6px; padding: 7px 11px; font-family: 'DM Mono', monospace; font-size: .76rem; color: var(--ink); outline: none; transition: border-color .13s; }
.fi-text:focus { border-color: var(--gold); }
.fi-text::placeholder { color: var(--muted); }
.fi-date { background: rgba(42,24,0,.04); border: 1px solid var(--rule); border-radius: 6px; padding: 7px 11px; font-family: 'DM Mono', monospace; font-size: .76rem; color: var(--ink); outline: none; transition: border-color .13s; }
.fi-date:focus { border-color: var(--gold); }
.btn-save { background: var(--surface); color: var(--gold); border: none; border-radius: 6px; padding: 7px 15px; font-family: 'DM Mono', monospace; font-size: .7rem; letter-spacing: .07em; cursor: pointer; transition: opacity .13s; }
.btn-save:hover { opacity: .8; }
.btn-cancel { background: none; color: var(--muted); border: 1px solid var(--rule); border-radius: 6px; padding: 7px 12px; font-family: 'DM Mono', monospace; font-size: .7rem; cursor: pointer; transition: color .13s; }
.btn-cancel:hover { color: var(--ink); }

/* ── DRI chip ── */
.dri-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .66rem; color: var(--muted);
  background: rgba(42,24,0,.05); border: 1px solid var(--rule);
  border-radius: 20px; padding: 3px 10px 3px 5px;
  cursor: pointer; user-select: none;
  transition: background .13s, border-color .13s;
  letter-spacing: .02em; white-space: nowrap;
}
.dri-chip:hover { background: rgba(42,24,0,.09); border-color: rgba(217,159,24,.5); }
.dri-chip.has-dri { color: var(--ink); padding-left: 4px; }

.dri-avatar-wrap { position: relative; width: 20px; height: 20px; flex-shrink: 0; }
.dri-avatar-wrap img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; display: block; }
.dri-initials-pill {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold); color: var(--surface);
  font-size: .52rem; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; letter-spacing: 0;
}
.dri-avatar-wrap .dri-initials-pill { position: absolute; top: 0; left: 0; display: none; }
.dri-avatar-wrap.img-err img { display: none; }
.dri-avatar-wrap.img-err .dri-initials-pill { display: flex; }

/* ── Floating DRI picker ── */
#dri-picker {
  position: fixed;
  z-index: 9999;
  display: none;
  width: 290px;
  background: #FBF7EE;
  border: 1px solid var(--rule);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(42,24,0,.14), 0 2px 8px rgba(42,24,0,.06);
  overflow: hidden;
}
.dri-search-wrap { padding: 10px 12px 8px; border-bottom: 1px solid var(--rule); }
#dri-input {
  width: 100%; background: rgba(42,24,0,.05); border: 1px solid var(--rule);
  border-radius: 7px; padding: 7px 11px; font-family: 'DM Mono', monospace;
  font-size: .76rem; color: var(--ink); outline: none; transition: border-color .13s;
}
#dri-input:focus { border-color: var(--gold); }
#dri-input::placeholder { color: var(--muted); }
#dri-results { max-height: 260px; overflow-y: auto; }
.dri-result {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; cursor: pointer; transition: background .1s;
}
.dri-result:hover { background: rgba(42,24,0,.05); }
.dri-result.focused { background: rgba(217,159,24,.1); }
.dri-result--clear { border-top: 1px solid var(--rule); }
.dri-result--clear:hover { background: rgba(176,48,48,.06); }
.dri-result-avatar-wrap { position: relative; width: 28px; height: 28px; flex-shrink: 0; }
.dri-result-avatar-wrap img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
.dri-result-avatar-wrap .dri-initials-pill { width: 28px; height: 28px; font-size: .62rem; position: absolute; top:0; left:0; display: none; }
.dri-result-avatar-wrap.img-err img { display: none; }
.dri-result-avatar-wrap.img-err .dri-initials-pill { display: flex; }
.dri-result-info { flex: 1; min-width: 0; }
.dri-result-name { font-size: .76rem; color: var(--ink); font-weight: 500; }
.dri-result-title { font-size: .62rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dri-result-clear-icon { font-size: .65rem; color: #b03030; }
.dri-no-results { padding: 12px 14px; font-size: .72rem; color: var(--muted); }

/* ── Prose ── */
.prose-section { font-size: .8rem; color: var(--muted); line-height: 1.9; }
.prose-section p { margin-bottom: 12px; }
.prose-section strong { color: var(--ink); font-weight: 500; }

/* ── About page ── */
.about-statement { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 500; color: var(--surface); line-height: 1.4; max-width: 560px; margin-bottom: 48px; }
.about-dims { display: flex; flex-direction: column; gap: 24px; }
.about-dim { display: flex; gap: 16px; align-items: flex-start; }
.about-dim__dot { width: 4px; border-radius: 2px; flex-shrink: 0; margin-top: 4px; align-self: stretch; min-height: 14px; }
.about-dim__name { font-size: .65rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink); margin-bottom: 5px; }
.about-dim__mission { font-size: .78rem; color: var(--muted); line-height: 1.7; max-width: 480px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(42,24,0,.13); border-radius: 3px; }

/* ── Dim FAB (more menu) ── */
.dim-fab { position: fixed; bottom: 32px; right: 32px; z-index: 200; display: none; flex-direction: column; align-items: flex-end; gap: 10px; }
.dim-fab.visible { display: flex; }

/* Pills — default/exit state: snaps away quickly */
.dim-fab__menu { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; pointer-events: none; }
.dim-fab__opt {
  background: var(--surface); border: none; border-radius: 100px;
  height: 52px; padding: 0 22px; cursor: pointer; white-space: nowrap;
  font-family: 'DM Mono', monospace; font-size: .69rem; letter-spacing: .05em; color: var(--gold);
  box-shadow: 0 2px 10px rgba(42,24,0,.14), 0 1px 3px rgba(42,24,0,.07);
  display: flex; align-items: center; gap: 8px;
  opacity: 0;
  transform: scale(0.82) translateY(10px);
  transform-origin: right bottom;
  transition: opacity .1s ease, transform .12s ease, box-shadow .15s, background .12s;
  pointer-events: none;
}

/* Pills — hover/open state: spring in, staggered from bottom up */
.dim-fab:hover .dim-fab__opt {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: all;
  transition:
    opacity .2s ease,
    transform .38s cubic-bezier(0.34, 1.42, 0.64, 1),
    box-shadow .15s, background .12s;
}
/* add mission (child 2) comes first, delete mission (child 1) staggers in after */
.dim-fab:hover .dim-fab__opt:nth-child(2) { transition-delay: 0s; }
.dim-fab:hover .dim-fab__opt:nth-child(1) { transition-delay: .08s; }

.dim-fab__opt:hover {
  box-shadow: 0 6px 24px rgba(42,24,0,.26), inset 0 0 0 1px rgba(217,159,24,.15);
  background: rgba(42,24,0,.96);
}
.dim-fab__opt--danger { color: #c0392b; }
.dim-fab__opt--danger:hover { background: rgba(50,15,15,.97); box-shadow: 0 6px 24px rgba(176,48,48,.2), inset 0 0 0 1px rgba(176,48,48,.18); }
.dim-fab__opt--done { color: var(--gold); }

/* Button — spring scale + dots spread */
.dim-fab__btn {
  width: 52px; height: 52px; border-radius: 50%; border: none;
  background: var(--surface); color: rgba(255,255,255,.82); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(42,24,0,.22), 0 1px 4px rgba(42,24,0,.1);
  transition: box-shadow .22s, transform .32s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.dim-fab:hover .dim-fab__btn {
  box-shadow: 0 8px 32px rgba(42,24,0,.32), 0 2px 8px rgba(42,24,0,.1);
  transform: scale(1.1);
}
/* Dots spread apart on hover */
.dim-fab__btn svg circle { transition: transform .28s cubic-bezier(0.34, 1.56, 0.64, 1); }
.dim-fab:hover .dim-fab__btn svg circle:first-child  { transform: translateX(-2px); }
.dim-fab:hover .dim-fab__btn svg circle:last-child   { transform: translateX(2px); }

.main--delete-mode .output-card__del-btn { opacity: 1 !important; }

/* ── Custom output title (editable) ── */
.output-card__title--editable { outline: none; cursor: text; border-radius: 3px; transition: background .1s; }
.output-card__title--editable:hover { background: rgba(217,159,24,.07); }
.output-card__title--editable:focus { background: rgba(217,159,24,.12); }
.output-card__title--editable:empty::before { content: 'Area title…'; opacity: .35; font-weight: 400; }
</style>

const FIREBASE_CONFIG = {

  appId: "",
}
let db, DOC, _remoteListenerActive = false
try {
  firebase.initializeApp(FIREBASE_CONFIG)

  DOC = db.collection('studio').doc('presence')
} catch(e) { console.warn('Firebase init failed (config not set?):', e) }

// ── State ────────────────────────────────────────────────────────────────────
const KEY = 'studiopresence-tracker-v4'
function defaultState() {
  return { v:4, milestones:[], missions:{}, dimOwners:{}, areaOwners:{}, customOutputs:{}, summary:null, updatedAt:null }
}
let state = defaultState()
// Warm-start from localStorage so the UI isn't blank while Firestore loads
try {
  const raw = localStorage.getItem(KEY)
  if (raw) { const p = JSON.parse(raw); if (p.v === 4) state = { ...defaultState(), ...p } }
} catch(e) {}
// Fetch live state then subscribe to real-time updates
if (DOC) {
  DOC.get().then(snap => {
    if (snap.exists()) {
      const p = snap.data()
      if (p.v === 4) { state = { ...defaultState(), ...p }; render() }
    }
    if (!_remoteListenerActive) {
      _remoteListenerActive = true
      DOC.onSnapshot(snap => {
        if (!snap.exists()) return
        const p = snap.data()
        if (p.v === 4 && p.updatedAt !== state.updatedAt) { state = { ...defaultState(), ...p }; render() }
      })
    }
  }).catch(e => console.warn('Firestore load failed, using local state:', e))
}
function save() {
  state.updatedAt = Date.now()
  localStorage.setItem(KEY, JSON.stringify(state))
  if (DOC) DOC.set(state).catch(e => console.warn('Firestore write failed:', e))
}

// ── Utils ────────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7) }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function today() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function dateToYM(ds) { return ds ? ds.slice(0,7) : '' }
function formatMonth(ym) { if(!ym) return ''; const [y,m]=ym.split('-').map(Number); return `${['January','February','March','April','May','June','July','August','September','October','November','December'][m-1]} ${y}` }
function formatDate(ds) {
  if(!ds) return ''; const [y,m,d]=ds.split('-').map(Number)
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]
  return `${mn} ${d}${y!==new Date().getFullYear()?` '${String(y).slice(2)}`:''}`
}
function progressClass(p) { if(p<=0) return 'p-zero'; if(p>=100) return 'p-done'; return 'p-doing' }
function initials(name) { return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() }

// ── DRI chip HTML ─────────────────────────────────────────────────────────────
function getDri(mapKey, id) {
  const map = mapKey === 'dim' ? state.dimOwners : state.areaOwners
  const val = map[id]
  if (!val) return null
  if (typeof val === 'string') return { name: val, avatar: null }
  return val
}

function avatarWrapHTML(avatar, name, size = 20) {
  const ini = initials(name)
  if (avatar) {
    return `<span class="dri-avatar-wrap" style="width:${size}px;height:${size}px">
      <img src="${esc(avatar)}" style="width:${size}px;height:${size}px" onerror="this.parentNode.classList.add('img-err')" loading="lazy">
      <span class="dri-initials-pill" style="width:${size}px;height:${size}px">${ini}</span>
    </span>`
  }
  return `<span class="dri-initials-pill" style="width:${size}px;height:${size}px;flex-shrink:0">${ini}</span>`
}

function driChipHTML(id, mapKey) {
  const dri = getDri(mapKey, id)
  if (!dri) {
    return `<span class="dri-chip" data-dri-id="${esc(id)}" data-dri-map="${mapKey}">${USER_SVG}<span>Add DRI</span></span>`
  }
  return `<span class="dri-chip has-dri" data-dri-id="${esc(id)}" data-dri-map="${mapKey}">
    ${avatarWrapHTML(dri.avatar, dri.name, 20)}
    <span>${esc(dri.name)}</span>
  </span>`
}

// ── Floating DRI picker ───────────────────────────────────────────────────────
let _dri = null // { id, mapKey }

function openDriPicker(id, mapKey, chipEl) {
  _dri = { id, mapKey }
  const picker = document.getElementById('dri-picker')
  const input  = document.getElementById('dri-input')
  const rect   = chipEl.getBoundingClientRect()

  // Position: prefer below, flip up if too close to bottom
  let top = rect.bottom + 6
  if (top + 300 > window.innerHeight) top = rect.top - 306
  let left = rect.left
  if (left + 295 > window.innerWidth) left = window.innerWidth - 300

  picker.style.top  = top + 'px'
  picker.style.left = left + 'px'
  picker.style.display = 'block'

  const cur = getDri(mapKey, id)
  input.value = cur ? cur.name : ''
  renderDriResults(input.value)
  setTimeout(() => { input.focus(); input.select() }, 30)
}

function renderDriResults(query) {
  const q = query.toLowerCase().trim()
  const filtered = q ? TEAM.filter(p => p.name.toLowerCase().includes(q)) : TEAM
  const cur = _dri ? getDri(_dri.mapKey, _dri.id) : null
  let html = ''

  if (filtered.length === 0) {
    html = `<div class="dri-no-results">No match — press Enter to use "${esc(query)}"</div>`
  } else {
    html = filtered.slice(0, 7).map(p =>
      `<div class="dri-result" onclick="selectDri('${esc(p.userId)}')">
        <span class="dri-result-avatar-wrap" style="width:28px;height:28px">
          <img src="${esc(p.avatar)}" style="width:28px;height:28px" onerror="this.parentNode.classList.add('img-err')" loading="lazy">
          <span class="dri-initials-pill" style="width:28px;height:28px;font-size:.62rem">${initials(p.name)}</span>
        </span>
        <div class="dri-result-info">
          <div class="dri-result-name">${esc(p.name)}</div>
          <div class="dri-result-title">${esc(p.title)}</div>
        </div>
      </div>`
    ).join('')
  }

  if (cur) {
    html += `<div class="dri-result dri-result--clear" onclick="clearDri()">
      <span class="dri-result-clear-icon">✕</span>
      <div class="dri-result-info"><div class="dri-result-name" style="color:#b03030">Remove DRI</div></div>
    </div>`
  }

  document.getElementById('dri-results').innerHTML = html
}

function selectDri(userId) {
  const person = TEAM.find(p => p.userId === userId)
  if (!person || !_dri) return
  const map = _dri.mapKey === 'dim' ? state.dimOwners : state.areaOwners
  map[_dri.id] = { name: person.name, avatar: person.avatar, userId: person.userId, title: person.title }
  save()
  closeDriPicker()
  render()
}

function selectDriFree(name) {
  if (!name.trim() || !_dri) return
  const map = _dri.mapKey === 'dim' ? state.dimOwners : state.areaOwners
  map[_dri.id] = { name: name.trim(), avatar: null }
  save()
  closeDriPicker()
  render()
}

function clearDri() {
  if (!_dri) return
  const map = _dri.mapKey === 'dim' ? state.dimOwners : state.areaOwners
  delete map[_dri.id]
  save()
  closeDriPicker()
  render()
}

function closeDriPicker() {
  document.getElementById('dri-picker').style.display = 'none'
  _dri = null
}

// ── Milestone outputs ─────────────────────────────────────────────────────────
const _outputOpen = new Set()
let _outputTargetId = null

function toggleMsOutput(msId) {
  const sec = document.getElementById('mso-' + msId)
  if (_outputOpen.has(msId)) { _outputOpen.delete(msId); if (sec) sec.classList.remove('open') }
  else                        { _outputOpen.add(msId);    if (sec) sec.classList.add('open')    }
}

function attachOutput(msId) {
  _outputTargetId = msId
  document.getElementById('output-file-input').click()
}

function handleOutputFile(input) {
  const msId = _outputTargetId
  const ms = state.milestones.find(x => x.id === msId)
  if (!ms || !input.files[0]) { input.value = ''; return }
  const file = input.files[0]
  input.value = ''
  const reader = new FileReader()
  reader.onload = e => {
    if (!ms.outputs) ms.outputs = []
    ms.outputs.push({ id: uid(), dataUrl: e.target.result, name: file.name })
    _outputOpen.add(msId)
    save(); render()
  }
  reader.readAsDataURL(file)
}

function removeOutput(msId, outputId) {
  const ms = state.milestones.find(x => x.id === msId)
  if (!ms) return
  ms.outputs = (ms.outputs || []).filter(o => o.id !== outputId)
  save(); render()
}

function previewOutput(dataUrl) {
  document.getElementById('output-lightbox-img').src = dataUrl
  document.getElementById('output-lightbox').classList.add('open')
}

function closeOutputLightbox() {
  document.getElementById('output-lightbox').classList.remove('open')
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOutputLightbox()
})

let _driDeleting = false
document.getElementById('dri-input').addEventListener('keydown', e => {
  _driDeleting = e.key === 'Backspace' || e.key === 'Delete'
  if (e.key === 'Escape') { e.preventDefault(); closeDriPicker() }
  if (e.key === 'Tab' || e.key === 'ArrowRight') {
    const input = e.target
    if (input.selectionStart < input.selectionEnd) {
      e.preventDefault()
      input.setSelectionRange(input.value.length, input.value.length)
      renderDriResults(input.value)
      return
    }
  }
  if (e.key === 'Enter') {
    const q = e.target.value.trim()
    const match = TEAM.find(p => p.name.toLowerCase() === q.toLowerCase())
    if (match) selectDri(match.userId)
    else if (q) selectDriFree(q)
  }
})
document.getElementById('dri-input').addEventListener('input', e => {
  const q = e.target.value
  renderDriResults(q)
  if (!_driDeleting && q.length > 0) {
    const match = TEAM.find(p => p.name.toLowerCase().startsWith(q.toLowerCase()))
    if (match) {
      e.target.value = match.name
      e.target.setSelectionRange(q.length, match.name.length)
    }
  }
})

document.addEventListener('click', e => {
  const chip = e.target.closest('.dri-chip')
  const picker = document.getElementById('dri-picker')
  if (chip) {
    e.stopPropagation()
    openDriPicker(chip.dataset.driId, chip.dataset.driMap, chip)
    return
  }
  if (picker.style.display !== 'none' && !picker.contains(e.target)) closeDriPicker()
})

// ── Milestone helpers ─────────────────────────────────────────────────────────
function areaAvgProgress(areaId) {
  const ms = state.milestones.filter(m => m.area === areaId)
  return ms.length ? Math.round(ms.reduce((s,m) => s + m.progress, 0) / ms.length) : null
}
function dimAvgProgress(dimKey) {
  const ms = state.milestones.filter(m => m.dim === dimKey)
  return ms.length ? Math.round(ms.reduce((s,m) => s + m.progress, 0) / ms.length) : null
}

function progressPillHTML(msId, progress) {
  const pc = progressClass(progress)
  return `<span class="ms-progress ${pc}" onclick="editProgress('${msId}', this)">${progress >= 100 ? 'Done' : progress + '%'}</span>`
}

function msRowHTML(ms, opts = {}) {
  const pc = progressClass(ms.progress)
  const isEditable = opts.editable !== false
  const areaInfo = AREA_MAP[ms.area]
  const outputs = ms.outputs || []
  const isOutputOpen = _outputOpen.has(ms.id)
  const dri = opts.showDri ? (state.areaOwners[ms.area] || state.dimOwners[ms.dim] || null) : null

  const thumbsHTML = outputs.map(o =>
    `<div class="ms-output-thumb-wrap">
      <img src="${esc(o.dataUrl)}" class="ms-output-thumb" onclick="previewOutput('${esc(o.dataUrl)}')" title="${esc(o.name)}">
      ${isEditable ? `<button class="ms-output-remove" onclick="removeOutput('${ms.id}','${o.id}')">✕</button>` : ''}
    </div>`
  ).join('')

  const showOutputAffordance = isEditable || outputs.length > 0
  const outputSection = showOutputAffordance
    ? `<div class="ms-output-section${isOutputOpen ? ' open' : ''}" id="mso-${ms.id}">
        <div class="ms-output-section-lbl">Output</div>
        <div class="ms-output-thumbs">
          ${thumbsHTML}
          ${isEditable ? `<button class="ms-output-attach" onclick="attachOutput('${ms.id}')">${PLUS_SVG} Attach</button>` : ''}
        </div>
      </div>`
    : ''

  const outputBtn = showOutputAffordance
    ? `<button class="ms-output-btn${outputs.length ? ' has-outputs' : ''}" onclick="toggleMsOutput('${ms.id}')" title="Output">
        ${IMAGE_SVG}${outputs.length ? `<span class="ms-output-count">${outputs.length}</span>` : ''}
      </button>`
    : ''

  const dimStyle = opts.dimColor ? ` style="--dim-c:${opts.dimColor}"` : ''
  return `<div class="ms-block"${dimStyle}>
    <div class="ms-row ${pc}">
      <div class="ms-circle" onclick="toggleMsDone('${ms.id}')">${ms.progress >= 100 ? CHECK_SVG : ''}</div>
      <span class="ms-label${isEditable?' editable':''}"${isEditable?` onclick="startMsEdit('${ms.id}', this)"`:''}>
        ${esc(ms.label)}</span>
      ${opts.showArea && areaInfo ? `<span class="ms-area-tag">${esc(areaInfo.title)}</span>` : ''}
      ${dri ? avatarWrapHTML(dri.avatar, dri.name, 18) : ''}
      <span class="ms-date-tag">${formatDate(ms.date)}</span>
      ${progressPillHTML(ms.id, ms.progress)}
      ${outputBtn}
      ${isEditable ? `<button class="ms-delete" onclick="deleteMs('${ms.id}')" title="Remove">✕</button>` : ''}
    </div>
    ${outputSection}
  </div>`
}

function toggleMsDone(msId) {
  const ms = state.milestones.find(x => x.id === msId)
  if (!ms) return
  ms.progress = ms.progress >= 100 ? 0 : 100
  save(); render()
}

function editProgress(msId, pillEl) {
  const ms = state.milestones.find(x => x.id === msId)
  if (!ms) return
  const input = document.createElement('input')
  input.type = 'text'; input.inputMode = 'numeric'
  input.value = ms.progress; input.className = 'ms-progress-input'
  pillEl.replaceWith(input); input.focus(); input.select()
  function commit() {
    let val = parseInt(input.value, 10)
    if (isNaN(val)) val = ms.progress
    ms.progress = Math.max(0, Math.min(100, val))
    save(); render()
  }
  input.addEventListener('blur', commit)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur() }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); render() }
  })
}

function openAddForm(areaId) {
  const form = document.getElementById('form-' + areaId)
  const btn  = document.getElementById('addbtn-' + areaId)
  if (!form || !btn) return
  btn.style.display = 'none'; form.classList.add('visible')
  const inp = document.getElementById('fi-' + areaId)
  if (inp) { inp.value = ''; setTimeout(() => inp.focus(), 30) }
  const di = document.getElementById('fd-' + areaId)
  if (di) di.value = today()
}

function closeAddForm(areaId) {
  const form = document.getElementById('form-' + areaId)
  const btn  = document.getElementById('addbtn-' + areaId)
  if (form) form.classList.remove('visible')
  if (btn)  btn.style.display = ''
}

function saveMilestone(dimKey, areaId) {
  const inp = document.getElementById('fi-' + areaId)
  const di  = document.getElementById('fd-' + areaId)
  const label = inp ? inp.value.trim() : ''
  if (!label) { inp && inp.focus(); return }
  state.milestones.push({ id: uid(), dim: dimKey, area: areaId, label, date: (di&&di.value) ? di.value : today(), progress: 0 })
  save(); render()
}

function deleteMs(msId) {
  state.milestones = state.milestones.filter(m => m.id !== msId)
  save(); render()
}

function startMsEdit(msId, el) {
  if (el.contentEditable === 'true') return
  const ms = state.milestones.find(x => x.id === msId)
  if (!ms) return
  const orig = ms.label
  el.contentEditable = 'true'; el.classList.add('is-editing'); el.focus()
  const range = document.createRange(); range.selectNodeContents(el)
  window.getSelection().removeAllRanges(); window.getSelection().addRange(range)
  function commit() {
    el.contentEditable = 'false'; el.classList.remove('is-editing')
    const text = el.textContent.trim()
    if (text) { ms.label = text; save() } else el.textContent = orig
  }
  el.onblur = commit
  el.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur() }
    if (e.key === 'Escape') { el.textContent = orig; el.blur() }
  }
}

function bindMissionEdit(el, areaId, defaultText) {
  const actionsEl = () => document.getElementById('mact-' + areaId)
  el.addEventListener('focus', () => { const a = actionsEl(); if (a) a.classList.add('visible') })
  el.addEventListener('blur', () => {
    const text = el.textContent.trim()
    if (text && text !== defaultText) state.missions[areaId] = text
    else { delete state.missions[areaId]; if (!text) el.textContent = defaultText }
    save()
    setTimeout(() => { const a = actionsEl(); if (a && document.activeElement !== el) a.classList.remove('visible') }, 120)
  })
  el.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      el.textContent = state.missions[areaId] || defaultText
      const a = actionsEl(); if (a) a.classList.remove('visible')
      el.blur()
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur() }
  })
}

function saveMissionAction(areaId) {
  const el = document.querySelector(`.output-mission[data-area-id="${areaId}"]`)
  if (el) el.blur()
}

function discardMissionAction(areaId) {
  const el = document.querySelector(`.output-mission[data-area-id="${areaId}"]`)
  const area = AREA_MAP[areaId]
  if (!el || !area) return
  el.textContent = state.missions[areaId] || area.defaultMission
  const a = document.getElementById('mact-' + areaId); if (a) a.classList.remove('visible')
  el.blur()
}

function startDeleteOutput(id) {
  const bar = document.getElementById('confirm-' + id)
  if (bar) bar.classList.add('visible')
}

function cancelDeleteOutput(id) {
  const bar = document.getElementById('confirm-' + id)
  if (bar) bar.classList.remove('visible')
}

function confirmDeleteOutput(id, dimKey) {
  if (!state.customOutputs?.[dimKey]) return
  state.customOutputs[dimKey] = state.customOutputs[dimKey].filter(o => o.id !== id)
  delete state.missions[id]
  delete state.areaOwners[id]
  delete AREA_MAP[id]
  save()
  render()
}

function focusMission(areaId) {
  const el = document.querySelector(`.people-mission-edit[data-area-id="${areaId}"]`)
  if (!el) return
  el.focus()
  const range = document.createRange(); range.selectNodeContents(el)
  window.getSelection().removeAllRanges(); window.getSelection().addRange(range)
}

// ── AI Summary ────────────────────────────────────────────────────────────────
const AI_KEY_STORE = 'sp-ai-key'

function buildSummaryPrompt() {
  const months = [...new Set(state.milestones.map(m => dateToYM(m.date)).filter(Boolean))].sort()
  if (!months.length) return null

  let lines = [`Studio Presence — milestone status as of ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`, '']

  DIMS.forEach(d => {
    const ms = state.milestones.filter(m => m.dim === d.key)
    if (!ms.length) { lines.push(`${d.name}: No milestones added yet`); return }
    const avg = Math.round(ms.reduce((s,m) => s + m.progress, 0) / ms.length)
    lines.push(`${d.name} (avg ${avg}%):`)
    ms.forEach(m => {
      const area = AREA_MAP[m.area]
      const dri  = getDri('area', m.area)
      lines.push(`  - [${m.progress}%] ${m.label} (due ${formatDate(m.date)}, area: ${area ? area.title : m.area}${dri ? ', DRI: '+dri.name : ''})`)
    })
  })

  return lines.join('\n')
}

async function generateSummary(forceKey) {
  let apiKey = forceKey || localStorage.getItem(AI_KEY_STORE)
  if (!apiKey) {
    renderSummaryKeyPrompt()
    return
  }
  localStorage.setItem(AI_KEY_STORE, apiKey)

  const prompt = buildSummaryPrompt()
  if (!prompt) return

  // Show loading
  state.summary = { text: null, generatedAt: null, loading: true }
  renderSummaryCard()

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 220,
        system: `You summarize progress for Studio, a cross-brand design organization spanning DoorDash, Wolt, and Roo. The Studio Presence program tracks three dimensions: Show (external content), Stage (talks/events), and Sphere (community/hiring). Write a crisp 3–4 sentence briefing paragraph — plain prose, no bullets. Flag what's on track, what needs attention, and any patterns you notice. Be specific about progress where it's meaningful.`,
        messages: [{ role: 'user', content: prompt }],
      }),
    })

    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      if (res.status === 401) {
        localStorage.removeItem(AI_KEY_STORE)
        state.summary = { error: 'Invalid API key. Click to re-enter.', generatedAt: null }
      } else {
        state.summary = { error: `API error: ${err.error?.message || res.status}`, generatedAt: null }
      }
      renderSummaryCard(); return
    }

    const data = await res.json()
    const text = data.content?.[0]?.text || ''
    state.summary = { text, generatedAt: Date.now(), loading: false }
    save()
  } catch(e) {
    state.summary = { error: 'Network error. Check console.', generatedAt: null }
  }
  renderSummaryCard()
}

function renderSummaryKeyPrompt() {
  const card = document.getElementById('summary-card')
  if (!card) return
  card.innerHTML = `
    <div class="summary-card__header">
      <span class="summary-card__spark">✦</span>
      <span class="summary-card__label">AI Summary</span>
    </div>
    <div class="summary-key-row">
      <input class="summary-key-input" id="api-key-input" type="password" placeholder="Paste Anthropic API key to enable summaries…">
      <button class="summary-btn primary" onclick="submitApiKey()">Enable</button>
    </div>`
  document.getElementById('api-key-input')?.focus()
}

function submitApiKey() {
  const val = document.getElementById('api-key-input')?.value.trim()
  if (val) generateSummary(val)
}

function renderSummaryCard() {
  const card = document.getElementById('summary-card')
  if (!card) return

  if (!state.summary || state.summary.loading) {
    card.innerHTML = `
      <div class="summary-card__header">
        <span class="summary-card__spark">✦</span>
        <span class="summary-card__label">AI Summary</span>
      </div>
      <div class="summary-text loading">Generating summary…</div>`
    return
  }

  if (state.summary.error) {
    card.innerHTML = `
      <div class="summary-card__header">
        <span class="summary-card__spark">✦</span>
        <span class="summary-card__label">AI Summary</span>
        <div class="summary-card__actions">
          <button class="summary-btn" onclick="localStorage.removeItem('${AI_KEY_STORE}');state.summary=null;renderSummaryKeyPrompt()">Reset key</button>
        </div>
      </div>
      <div class="summary-text loading">${esc(state.summary.error)}</div>`
    return
  }

  const ago = state.summary.generatedAt
    ? `Generated ${new Date(state.summary.generatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`
    : ''

  card.innerHTML = `
    <div class="summary-card__header">
      <span class="summary-card__spark">✦</span>
      <span class="summary-card__label">AI Summary</span>
      <div class="summary-card__actions">
        <button class="summary-btn" onclick="generateSummary()">Regenerate</button>
      </div>
    </div>
    <div class="summary-text">${esc(state.summary.text || '')}</div>
    ${ago ? `<div class="summary-meta">${ago}</div>` : ''}`
}

// ── Renders ───────────────────────────────────────────────────────────────────
function renderDashboard() {
  const months = [...new Set(state.milestones.map(m => dateToYM(m.date)).filter(Boolean))].sort()
  const hasKey = !!localStorage.getItem(AI_KEY_STORE)
  const hasMilestones = months.length > 0

  // Summary card
  let summaryHTML = ''
  if (!hasMilestones) {

        <div class="summary-key-row">
          <input class="summary-key-input" id="api-key-input" type="password" placeholder="Paste Anthropic API key to enable summaries…">

        </div>
      </div>`

  } else if (!hasKey) {
    summaryHTML = `<div class="summary-card" id="summary-card">
      <div class="summary-card__header"><span class="summary-card__spark">✦</span><span class="summary-card__label">AI Summary</span></div>
      <div class="summary-key-row">
        <input class="summary-key-input" id="api-key-input" type="password" placeholder="Paste Anthropic API key to enable summaries…">
        <button class="summary-btn primary" onclick="submitApiKey()">Enable</button>
      </div>
    </div>`
  } else if (state.summary && !state.summary.loading) {
    const ago = state.summary.generatedAt
      ? `Generated ${new Date(state.summary.generatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`
      : ''
    if (state.summary.error) {
      summaryHTML = `<div class="summary-card" id="summary-card">
        <div class="summary-card__header"><span class="summary-card__spark">✦</span><span class="summary-card__label">AI Summary</span>
          <div class="summary-card__actions"><button class="summary-btn" onclick="localStorage.removeItem('${AI_KEY_STORE}');state.summary=null;render()">Reset key</button></div>
        </div>
        <div class="summary-text loading">${esc(state.summary.error)}</div>
      </div>`
    } else {
      summaryHTML = `<div class="summary-card" id="summary-card">
        <div class="summary-card__header"><span class="summary-card__spark">✦</span><span class="summary-card__label">AI Summary</span>
          <div class="summary-card__actions"><button class="summary-btn" onclick="generateSummary()">Regenerate</button></div>
        </div>
        <div class="summary-text">${esc(state.summary.text || '')}</div>
        ${ago ? `<div class="summary-meta">${ago}</div>` : ''}
      </div>`
    }
  } else {
    // Has key, no summary yet (or loading)
    const isLoading = state.summary && state.summary.loading
    summaryHTML = `<div class="summary-card" id="summary-card">
      <div class="summary-card__header"><span class="summary-card__spark">✦</span><span class="summary-card__label">AI Summary</span>
        ${!isLoading && hasMilestones ? `<div class="summary-card__actions"><button class="summary-btn primary" onclick="generateSummary()">Generate</button></div>` : ''}
      </div>
      ${isLoading ? `<div class="summary-text loading">Generating summary…</div>` : `<div class="summary-text loading" style="opacity:.5">Add milestones then generate a summary.</div>`}
    </div>`
  }

  if (!hasMilestones) {
    return `<div class="page-header">
      <div class="page-header__eyebrow">Monthly Tracker</div>
      <div class="page-header__title">Milestones by Month</div>
      <div class="page-header__sub">Milestones added in Show, Stage, or Sphere appear here, organized by due date with a progress tracker per month.</div>
    </div>
    ${summaryHTML}
    <div class="empty-state">
      <div class="empty-state__glyph">○</div>
      <div class="empty-state__title">No milestones yet</div>
      <div class="empty-state__body">Navigate to a dimension and add a milestone with a date.</div>
    </div>`
  }

  const sections = months.map(ym => {
    const ms  = state.milestones.filter(m => dateToYM(m.date) === ym)
    const avg  = Math.round(ms.reduce((s,m) => s + m.progress, 0) / ms.length)
    const done = ms.filter(m => m.progress >= 100).length
    const byDim = {}
    ms.forEach(m => { if (!byDim[m.dim]) byDim[m.dim] = []; byDim[m.dim].push(m) })
    const groupsHTML = DIMS.filter(d => byDim[d.key]).map(d =>
      `<div class="dim-group dim-group--${d.key}">
        <div class="dim-group__label">${d.name}</div>
        ${byDim[d.key].map(m => msRowHTML(m, { editable:false, showArea:true, showDri:true, dimColor:d.color })).join('')}
      </div>`
    ).join('')
    return `<div class="month-section">
      <div class="month-header">
        <div class="month-header__name">${formatMonth(ym)}</div>
        <div class="month-header__count">${done} / ${ms.length} complete</div>
        <div class="pbar-wrap"><div class="pbar"><div class="pbar__fill" style="width:${avg}%"></div></div><span class="month-header__pct">${avg}%</span></div>
      </div>
      ${groupsHTML}
    </div>`
  }).join('')

  return `<div class="page-header">
    <div class="page-header__eyebrow">Monthly Tracker</div>
    <div class="page-header__title">Milestones by Month</div>
  </div>
  ${summaryHTML}
  ${sections}`
}

let dimDeleteMode = false
function toggleDimDeleteMode() {
  dimDeleteMode = !dimDeleteMode
  const main = document.getElementById('main')
  if (main) main.classList.toggle('main--delete-mode', dimDeleteMode)
  updateFabMenu()
}
function updateFabMenu() {
  const isDimView = ['show', 'stage', 'sphere'].includes(view)
  const addOpt = document.getElementById('fab-opt-add')
  const delOpt = document.getElementById('fab-opt-delete')
  if (addOpt) {
    addOpt.innerHTML = `${SMALL_PLUS_SVG} add mission`
    addOpt.onclick = isDimView ? () => addCustomOutput(view) : null
  }
  if (delOpt) {
    delOpt.innerHTML = dimDeleteMode ? `${CHECK_SVG} done` : `${TRASH_SVG} delete mission`
    delOpt.className = dimDeleteMode ? 'dim-fab__opt dim-fab__opt--done' : 'dim-fab__opt dim-fab__opt--danger'
    delOpt.onclick = isDimView ? toggleDimDeleteMode : null
  }
}

function addCustomOutput(dimKey) {
  const id = dimKey + '-c-' + uid()
  if (!state.customOutputs) state.customOutputs = {}
  if (!state.customOutputs[dimKey]) state.customOutputs[dimKey] = []
  state.customOutputs[dimKey].push({ id, title: '' })
  AREA_MAP[id] = { id, title: '', defaultMission: '', dimKey, dimName: DIM_MAP[dimKey].name }
  save()
  render()
  setTimeout(() => {
    const el = document.querySelector(`[data-custom-title="${id}"]`)
    if (!el) return
    el.focus()
    const range = document.createRange(); range.selectNodeContents(el)
    window.getSelection().removeAllRanges(); window.getSelection().addRange(range)
    el.scrollIntoView({ behavior: 'smooth', block: 'center' })
  }, 30)
}

function bindCustomTitleEdit(el, id, dimKey) {
  el.addEventListener('blur', () => {
    const text = el.textContent.trim()
    const outs = state.customOutputs?.[dimKey] || []
    const out = outs.find(o => o.id === id)
    if (!out) return
    out.title = text || 'New area'
    if (AREA_MAP[id]) AREA_MAP[id].title = out.title
    if (!text) el.textContent = out.title
    save()
  })
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur() }
    if (e.key === 'Escape') el.blur()
  })
}

function renderDim(dimKey) {
  const dim = DIM_MAP[dimKey]; if (!dim) return ''
  const avg   = dimAvgProgress(dimKey)
  const total = state.milestones.filter(m => m.dim === dimKey).length
  const stat  = avg !== null ? `${avg}% avg · ${total} milestone${total!==1?'s':''}` : 'No milestones yet'

  const customOuts = (state.customOutputs && state.customOutputs[dimKey]) || []
  const allOuts = [...dim.outputs, ...customOuts.map(o => ({ ...o, defaultMission: '', isCustom: true }))]

  const outputsHTML = allOuts.map(out => {
    const missionText = state.missions[out.id] || out.defaultMission
    const areaPct = areaAvgProgress(out.id)
    const ms = state.milestones.filter(m => m.area === out.id)
    const headBarHTML = `<div class="output-card__head-bar"><div class="head-pbar"><div class="head-pbar__fill" style="width:${areaPct ?? 0}%;background:${dim.color}"></div></div><span class="head-pbar-pct">${areaPct !== null ? `${areaPct}%` : '—'}</span></div>`
    const titleHTML = out.isCustom
      ? `<div class="output-card__title output-card__title--editable" contenteditable="true" data-custom-title="${out.id}" data-custom-dim="${dimKey}" spellcheck="false">${esc(out.title)}</div>`
      : `<div class="output-card__title">${esc(out.title)}</div>`
    return `<div class="output-card" style="box-shadow:inset 3px 0 0 ${dim.color}">
      <div class="output-card__head">
        <div class="output-card__title-wrap">
          ${titleHTML}${headBarHTML}
        </div>
        <div class="output-card__head-right">
          ${driChipHTML(out.id, 'area')}
          ${out.isCustom ? `<button class="output-card__del-btn" onclick="startDeleteOutput('${out.id}')">${TRASH_SVG} Remove</button>` : ''}
        </div>
      </div>
      <div class="output-section-label">Mission</div>
      <div class="output-mission" contenteditable="true" data-area-id="${out.id}" data-placeholder="Define the mission…" spellcheck="false">${esc(missionText)}</div>
      <div class="mission-actions" id="mact-${out.id}">
        <button class="btn-mission-save" onmousedown="event.preventDefault()" onclick="saveMissionAction('${out.id}')">Save</button>
        <button class="btn-mission-discard" onmousedown="event.preventDefault()" onclick="discardMissionAction('${out.id}')">Discard</button>
      </div>
      <div class="output-section-label" style="padding-top:14px">Milestones</div>
      <div class="output-milestones">
        ${ms.length ? ms.map(m => msRowHTML(m, { editable:true, dimColor:dim.color })).join('') : `<div style="padding:6px 18px 8px;font-size:.72rem;color:var(--muted);opacity:.55">No milestones yet</div>`}
      </div>
      <div class="output-add">
        <button class="add-ms-btn" id="addbtn-${out.id}" onclick="openAddForm('${out.id}')">${PLUS_SVG} Add milestone</button>
        <div class="add-ms-form" id="form-${out.id}">
          <input class="fi-text" id="fi-${out.id}" type="text" placeholder="Describe this milestone…"
            onkeydown="if(event.key==='Enter'){saveMilestone('${dimKey}','${out.id}')}else if(event.key==='Escape'){closeAddForm('${out.id}')}">
          <input class="fi-date" id="fd-${out.id}" type="date" value="${today()}">
          <button class="btn-save" onclick="saveMilestone('${dimKey}','${out.id}')">Save</button>
          <button class="btn-cancel" onclick="closeAddForm('${out.id}')">Cancel</button>
        </div>
      </div>
      ${out.isCustom ? `<div class="output-card__confirm-bar" id="confirm-${out.id}">
        <span>Remove this area and all its data?</span>
        <button class="btn-confirm-del" onclick="confirmDeleteOutput('${out.id}','${dimKey}')">Yes, remove</button>
        <button class="btn-keep" onclick="cancelDeleteOutput('${out.id}')">Keep</button>
      </div>` : ''}
    </div>`
  }).join('')

  return `<div>
    <div class="dim-page-header">
      <div class="dim-accent" style="background:${dim.color}"></div>
      <div class="dim-header-body">
        <div class="dim-header-name">${dim.name}</div>
        <div class="dim-header-sub">${dim.subtitle}</div>
        <div class="dim-header-mission">${esc(dim.mission)}</div>
      </div>
      <div class="dim-header-meta">${driChipHTML(dimKey, 'dim')}<span class="dim-header-stat">${stat}</span></div>
    </div>
    ${outputsHTML}
  </div>`
}

function renderSignals() {
  return `<div class="page-header"><div class="page-header__eyebrow">Program</div><div class="page-header__title">Signals</div><div class="page-header__sub">Leading indicators the program is working.</div></div>
  <div class="prose-section">
    <p><strong>Inbound interest up</strong> — unsolicited DMs from designers after posts or talks.</p>
    <p><strong>Referral quality up</strong> — candidates mentioning Studio specifically in their process.</p>
    <p><strong>Repeat invites</strong> — conferences and orgs inviting Studio back without us pitching.</p>
    <p><strong>Community ask rate</strong> — external orgs asking Studio to co-create, speak, or partner.</p>
    <p><strong>Audience growth</strong> — steady growth in Studio's combined LinkedIn reach and post engagement.</p>
  </div>`
}

function renderAbout() {
  return `<div class="page-header">
    <div class="page-header__eyebrow">Studio Presence</div>
    <div class="page-header__title">About</div>
  </div>
  <div class="about-statement">Make DoorDash Design impossible to ignore — a studio the industry knows by name, wants to hire from, and looks to for how good design actually gets done at scale.</div>
  <div class="about-dims">
    ${DIMS.map(d => `<div class="about-dim">
      <span class="about-dim__dot" style="background:${d.color}"></span>
      <div>
        <div class="about-dim__name">${esc(d.name)}</div>
        <div class="about-dim__mission">${esc(d.mission)}</div>
      </div>
    </div>`).join('')}
  </div>`
}

function renderPeople() {
  const headRow = `<div class="people-table__head">
    <div class="people-col people-col--dim">Dim</div>
    <div class="people-col people-col--area">Area</div>
    <div class="people-col people-col--dri">DRI</div>
    <div class="people-col people-col--mission">Mission</div>
    <div class="people-col people-col--done">What's been done</div>
    <div class="people-col people-col--output">Output</div>
  </div>`

  const rows = DIMS.flatMap(dim =>
    dim.outputs.map((area, i) => {
      const mission = state.missions[area.id] || area.defaultMission

      const areaMs = state.milestones.filter(m => m.area === area.id)
      const doneMs = areaMs.filter(m => m.progress >= 100)
      const doneHTML = doneMs.length
        ? doneMs.map(m =>
            `<div class="people-done-item">
              <span class="people-done-check">${CHECK_SVG}</span>
              <span class="people-done-lbl">${esc(m.label)}</span>
            </div>`
          ).join('')
        : `<span class="people-empty">Nothing completed yet</span>`

      const allOutputs = areaMs.flatMap(m => m.outputs || [])
      const outputHTML = allOutputs.length
        ? `<div class="people-outputs">${allOutputs.map(o =>
            `<img src="${esc(o.dataUrl)}" class="people-output-thumb" onclick="previewOutput('${esc(o.dataUrl)}')" title="${esc(o.name)}">`
          ).join('')}</div>`
        : `<span class="people-empty">—</span>`

      const dimCell = i === 0
        ? `<div class="people-col people-col--dim"><span class="people-dim-badge" style="color:${dim.color}">${esc(dim.name)}</span></div>`
        : `<div class="people-col people-col--dim"></div>`

      return `<div class="people-table__row">
        ${dimCell}
        <div class="people-col people-col--area"><div class="people-area-name">${esc(area.title)}</div></div>
        <div class="people-col people-col--dri">${driChipHTML(area.id, 'area')}</div>
        <div class="people-col people-col--mission">
          <div class="people-mission-wrap">
            <div class="people-mission-edit${!state.missions[area.id] ? ' is-default' : ''}" contenteditable="true" data-area-id="${esc(area.id)}" data-placeholder="Write a mission…" spellcheck="false">${esc(mission)}</div>
            <button class="people-mission-pencil" onclick="focusMission('${esc(area.id)}')" title="Edit mission">${PENCIL_SVG}</button>
          </div>
        </div>
        <div class="people-col people-col--done">${doneHTML}</div>
        <div class="people-col people-col--output">${outputHTML}</div>
      </div>`
    })
  ).join('')

  return `<div class="page-header">
    <div class="page-header__eyebrow">Overview</div>
    <div class="page-header__title">Who's Driving What</div>
    <div class="page-header__sub">DRI, mission, and progress across all three dimensions. Click any DRI chip to assign ownership.</div>
  </div>
  <div class="people-table">${headRow}${rows}</div>`
}

function updateSidebar() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view))
  DIMS.forEach(d => {
    const avg = dimAvgProgress(d.key)
    const el  = document.getElementById('pct-' + d.key)
    if (!el) return
    const dri = state.dimOwners[d.key]
    const avatarHTML = dri ? avatarWrapHTML(dri.avatar, dri.name, 16) : ''
    const pctText = avg !== null ? `${avg}%` : '—'
    el.innerHTML = avatarHTML + pctText
  })
}

function render() {
  // Sync custom outputs into AREA_MAP so mission editing works for them
  if (state.customOutputs) {
    DIMS.forEach(d => {
      ;(state.customOutputs[d.key] || []).forEach(o => {
        AREA_MAP[o.id] = { id: o.id, title: o.title, defaultMission: '', dimKey: d.key, dimName: d.name }
      })
    })
  }

  const main = document.getElementById('main')
  main.classList.toggle('main--wide', view === 'vteam')
  if      (view === 'show')       main.innerHTML = renderDim('show')
  else if (view === 'stage')      main.innerHTML = renderDim('stage')
  else if (view === 'sphere')     main.innerHTML = renderDim('sphere')
  else if (view === 'vteam')      main.innerHTML = renderPeople()
  else if (view === 'signals')    main.innerHTML = renderSignals()
  else if (view === 'about')      main.innerHTML = renderAbout()
  else                            main.innerHTML = renderDashboard()
  updateSidebar()

  const isDimView = ['show', 'stage', 'sphere'].includes(view)
  if (!isDimView) dimDeleteMode = false
  main.classList.toggle('main--delete-mode', dimDeleteMode && isDimView)
  const fab = document.getElementById('dim-fab')
  if (fab) fab.classList.toggle('visible', isDimView)
  updateFabMenu()

  document.querySelectorAll('.output-mission[data-area-id], .people-mission-edit[data-area-id]').forEach(el => {
    const area = AREA_MAP[el.dataset.areaId]
    if (area) bindMissionEdit(el, area.id, area.defaultMission)
  })

  document.querySelectorAll('[data-custom-title]').forEach(el => {
    bindCustomTitleEdit(el, el.dataset.customTitle, el.dataset.customDim)
  })
}

render()
</script>
</body>
</html>
