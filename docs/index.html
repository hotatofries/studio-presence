        <button class="btn-mission-discard" onmousedown="event.preventDefault()" onclick="discardMissionAction('${out.id}')">Discard</button>
      </div>
      <div class="output-section-label" style="padding-top:14px">Milestones</div>
      <div class="output-milestones">
        ${ms.length ? ms.map(m => msRowHTML(m, { editable:true, dimColor:dim.color })).join('') : `<div style="padding:6px 18px 8px;font-size:.72rem;color:var(--muted);opacity:.55">No milestones yet</div>`}

function initRmDrag(list) {
  let dragSrc = null
  list.addEventListener('mousedown', e => {
    const handle = e.target.closest('.rm-drag-handle')
    if (handle) handle.closest('.rm-goal-row').draggable = true
  })
  list.addEventListener('dragstart', e => {
    dragSrc = e.target.closest('.rm-goal-row')
    if (!dragSrc) return
    dragSrc.classList.add('dragging')
    e.dataTransfer.effectAllowed = 'move'
  })
  list.addEventListener('dragover', e => {
    e.preventDefault()
    const row = e.target.closest('.rm-goal-row')
    if (!row || row === dragSrc) return
    list.querySelectorAll('.rm-goal-row').forEach(r => r.classList.remove('drag-before','drag-after'))
    const rect = row.getBoundingClientRect()
    row.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-before' : 'drag-after')
  })
  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) list.querySelectorAll('.rm-goal-row').forEach(r => r.classList.remove('drag-before','drag-after'))
  })
  list.addEventListener('drop', e => {
    e.preventDefault()
    const row = e.target.closest('.rm-goal-row')
    if (!row || !dragSrc || row === dragSrc) return
    row.classList.contains('drag-before') ? list.insertBefore(dragSrc, row) : list.insertBefore(dragSrc, row.nextSibling)
    list.querySelectorAll('.rm-goal-row').forEach(r => r.classList.remove('drag-before','drag-after','dragging'))
    if (dragSrc) dragSrc.draggable = false
  })
  list.addEventListener('dragend', () => {
    list.querySelectorAll('.rm-goal-row').forEach(r => { r.classList.remove('drag-before','drag-after','dragging'); r.draggable = false })
    dragSrc = null
  })
}

function closeRoadmapModal() {
  document.getElementById('roadmap-modal').classList.remove('open')
}

function saveRoadmapModal() {
  const data = getRoadmapData()
  state.roadmap = {
    vision: document.getElementById('rm-vision').value.trim(),
    quarters: data.quarters.map((q, qi) => {
      if (q.future) return q
      return {
        ...q,
        goals: Array.from(document.querySelectorAll(`#rm-q${qi}-goals .rm-goal-row`))
          .map(row => ({
            id: uid(),
            title: row.querySelector('.rm-title-input').value.trim(),
            sub:   row.querySelector('.rm-sub-input').value.trim(),
            theme: row.querySelector('.rm-theme-select').value,
          }))
          .filter(g => g.title)
      }
    })
  }
  save()
  closeRoadmapModal()
  render()
}

function renderRoadmap() {
  const data = getRoadmapData()

  function quarterSummary(q) {
    if (!q.goals.length) return ''
    const counts = {all:0,show:0,stage:0,sphere:0}
    q.goals.forEach(g => { counts[g.theme] = (counts[g.theme]||0)+1 })
    const dims = ['show','stage','sphere'].filter(t => counts[t])
    const cap = s => s[0].toUpperCase()+s.slice(1)
    let prose
    if (dims.length === 3) {
      prose = counts.all ? 'All dimensions active — a fully loaded quarter.' : 'Show, Stage, and Sphere all pushing forward.'
    } else if (dims.length === 2) {
      prose = `${cap(dims[0])} and ${cap(dims[1])} take the lead${counts.all ? ', grounded in cross-cutting work' : ''}.`
    } else if (dims.length === 1) {
      prose = `${cap(dims[0])}-focused quarter${counts.all ? ', with cross-cutting foundations alongside' : ''}.`
    } else {
      prose = 'Program-wide setup and alignment.'
    }
    const chips = ['all','show','stage','sphere'].filter(t => counts[t])
      .map(t => `<span class="roadmap-theme-tag ${t}">${cap(t)}</span>`).join('')
    return `<div class="roadmap-summary">
      <div class="roadmap-summary__prose">${prose}</div>
      <div class="roadmap-summary__chips">${chips}</div>
    </div>`
  }

  function goalHtml(g) {
    const dotColor = g.theme==='show' ? 'var(--show)' : g.theme==='stage' ? 'var(--stage)' : g.theme==='sphere' ? 'var(--sphere)' : 'var(--gold)'
    return `<div class="roadmap-goal">
      <div class="roadmap-goal__dot" style="background:${dotColor}"></div>
      <div class="roadmap-goal__body">
        <div class="roadmap-goal__title">${esc(g.title)}</div>
        ${g.sub ? `<div class="roadmap-goal__sub">${esc(g.sub)}</div>` : ''}
        <span class="roadmap-theme-tag ${g.theme}">${g.theme}</span>
      </div>
    </div>`
  }

  function col(q, isFirst, isLast, isCurrent, isFuture) {
    const cls = 'roadmap-col' + (isCurrent ? ' roadmap-col--now' : '') + (isFuture ? ' roadmap-col--future' : '')
    const rightInvisible = isLast && !isFuture
    return `
    <div class="${cls}">
      <div class="roadmap-col__header">
        <div class="roadmap-col__label">${q.label}</div>
        <div class="roadmap-col__name">${q.name}</div>
        <div class="roadmap-col__dates">${q.dates}</div>
      </div>
      <div class="roadmap-col__track">
        <div class="roadmap-track-line${isFirst ? ' invisible' : ''}"></div>
        <div class="roadmap-track-dot"></div>
        <div class="roadmap-track-line${rightInvisible ? ' invisible' : ''}"></div>
      </div>
      ${isFuture ? '' : `<div class="roadmap-col__connector"></div>
      <div class="roadmap-card">
        ${quarterSummary(q)}
        <div class="roadmap-goals">${[...q.goals].sort((a,b)=>['all','show','stage','sphere'].indexOf(a.theme)-['all','show','stage','sphere'].indexOf(b.theme)).map(goalHtml).join('')}</div>
      </div>`}
    </div>`
  }

  return `
  <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:36px;">
    <div class="page-header" style="margin-bottom:0">
      <div class="page-header__eyebrow">Program</div>
      <div class="page-header__title">Roadmap 2026</div>
    </div>
    <button class="summary-btn" onclick="openRoadmapModal()" style="margin-top:10px; flex-shrink:0">Edit</button>
  </div>
  <p class="roadmap-vision">${esc(data.vision)}</p>
  <div class="roadmap-cols">
    ${col(data.quarters[0], true,  false, true,  false)}
    ${col(data.quarters[1], false, false, false, false)}
    ${col(data.quarters[2], false, false, false, false)}
    ${col(data.quarters[3], false, true,  false, true)}
  </div>`
}

function renderAbout() {
  return `<div class="page-header">
    <div class="page-header__eyebrow">Studio Presence</div>
    <div class="page-header__title">About</div>
  </div>
  <div class="about-statement">Make DoorDash Design impossible to ignore — a studio the industry knows by name, wants to hire from, and looks to for how good design actually gets done at scale.</div>
  <div class="about-dims">
    ${DIMS.map(d => `<div class="about-dim">
      <span class="about-dim__dot" style="background:${d.color}"></span>
      <div>
        <div class="about-dim__name">${esc(d.name)}</div>
        <div class="about-dim__mission">${esc(d.mission)}</div>
      </div>
    </div>`).join('')}
  </div>`
}

function renderPeople() {
  const sectionsHTML = DIMS.map(dim => {
    const dimPct = dimAvgProgress(dim.key)
    const pbarHTML = dimPct !== null
      ? `<div class="ppl-section__pbar-wrap">
          <div class="ppl-section__pbar"><div class="ppl-section__pbar__fill" style="width:${dimPct}%"></div></div>
          <span class="ppl-section__pct">${dimPct}% avg</span>
        </div>`
      : ''

    const rowsHTML = dim.outputs.map(area => {
      const mission = (area.id in state.missions && state.missions[area.id] !== undefined) ? (state.missions[area.id] ?? '') : area.defaultMission
      const areaPct = areaAvgProgress(area.id)
      const areaMs = state.milestones.filter(m => m.area === area.id)
      const doneMs = areaMs.filter(m => m.progress >= 100)

      const progHTML = areaPct !== null
        ? `<div class="ppl-pbar-wrap">
            <div class="ppl-pbar"><div class="ppl-pbar__fill" style="width:${areaPct}%"></div></div>
            <span class="ppl-pbar-pct">${areaPct}%</span>
          </div>`
        : `<span class="people-empty">—</span>`

      const doneHTML = doneMs.length
        ? doneMs.map(m => `<div class="people-done-item">
            <span class="people-done-check">${CHECK_SVG}</span>
            <span class="people-done-lbl">${esc(m.label)}</span>
          </div>`).join('')
        : `<span class="people-empty">Nothing yet</span>`

      return `<div class="ppl-row">
        <div class="ppl-cell--area">${esc(state.areaNames?.[area.id] || area.title)}</div>
        <div class="ppl-cell--dri">${driChipHTML(area.id, 'area')}</div>
        <div class="ppl-cell--mission">
          <div class="people-mission-wrap">
            <div class="people-mission-edit${!state.missions[area.id] ? ' is-default' : ''}" contenteditable="true" data-area-id="${esc(area.id)}" data-placeholder="Write a mission…" spellcheck="false">${esc(mission)}</div>
            <button class="people-mission-pencil" onclick="focusMission('${esc(area.id)}')" title="Edit mission">${PENCIL_SVG}</button>
          </div>
        </div>
        <div class="ppl-cell--prog">${progHTML}</div>
        <div class="ppl-cell--done">${doneHTML}</div>
      </div>`
    }).join('')

    return `<div class="ppl-section" style="--dim-c:${dim.color}">
      <div class="ppl-section__header">
        <span class="ppl-section__name">${esc(dim.name)}</span>
        <span class="ppl-section__sub">${esc(dim.subtitle)}</span>
        ${pbarHTML}
      </div>
      <div class="ppl-head">
        <div>Area</div>
        <div>DRI</div>
        <div>Mission</div>
        <div>Progress</div>
        <div>Done</div>
      </div>
      ${rowsHTML}
    </div>`
  }).join('')

  return `<div class="page-header">
    <div class="page-header__eyebrow">Overview</div>
    <div class="page-header__title">Who's Driving What</div>
    <div class="page-header__sub">DRI, mission, and progress across all three dimensions. Click any DRI chip to assign ownership.</div>
  </div>
  <div class="ppl-sections">${sectionsHTML}</div>`
}

function updateSidebar() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view))
  DIMS.forEach(d => {
    const avg = dimAvgProgress(d.key)
    const el  = document.getElementById('pct-' + d.key)
    if (!el) return
    const dri = state.dimOwners[d.key]
    const avatarHTML = dri ? avatarWrapHTML(dri.avatar, dri.name, 16) : ''
    const pctText = avg !== null ? `${avg}%` : '—'
    el.innerHTML = avatarHTML + pctText
  })
}

function render() {
  // Sync custom outputs into AREA_MAP so mission editing works for them
  if (state.customOutputs) {
    DIMS.forEach(d => {
      ;(state.customOutputs[d.key] || []).forEach(o => {
        AREA_MAP[o.id] = { id: o.id, title: o.title, defaultMission: '', dimKey: d.key, dimName: d.name }
      })
    })
  }

  const main = document.getElementById('main')
  main.classList.toggle('main--wide', ['vteam', 'vision', 'roadmap'].includes(view))
  if      (view === 'show')       main.innerHTML = renderDim('show')
  else if (view === 'stage')      main.innerHTML = renderDim('stage')
  else if (view === 'sphere')     main.innerHTML = renderDim('sphere')
  else if (view === 'vteam')      main.innerHTML = renderPeople()
  else if (view === 'signals')    main.innerHTML = renderSignals()
  else if (view === 'vision')     main.innerHTML = renderVision()
  else if (view === 'roadmap')    main.innerHTML = renderRoadmap()
  else if (view === 'about')      main.innerHTML = renderAbout()
  else                            main.innerHTML = renderDashboard()
  updateSidebar()

  const isDimView = ['show', 'stage', 'sphere'].includes(view)
  if (!isDimView) dimDeleteMode = false
  main.classList.toggle('main--delete-mode', dimDeleteMode && isDimView)
  const fab = document.getElementById('dim-fab')
  if (fab) fab.classList.toggle('visible', isDimView)
  updateFabMenu()

  document.querySelectorAll('.output-mission[data-area-id], .people-mission-edit[data-area-id]').forEach(el => {
    const area = AREA_MAP[el.dataset.areaId]
    if (area) bindMissionEdit(el, area.id, area.defaultMission)
  })

  document.querySelectorAll('[data-custom-title]').forEach(el => {
    bindCustomTitleEdit(el, el.dataset.customTitle, el.dataset.customDim)
  })

  document.querySelectorAll('[data-area-name]').forEach(el => {
    bindAreaNameEdit(el, el.dataset.areaName)
  })
}

render()

// ── Mini calendar ─────────────────────────────────────────────────────────────
let _miniCalMsId = null, _miniCalYear = null, _miniCalMonth = null

function openMiniCal(msId, anchorEl) {
  _miniCalMsId = msId
  const ms = state.milestones.find(x => x.id === msId)
  if (!ms) return
  const d = ms.date || today()
  _miniCalYear = parseInt(d.slice(0,4), 10)
  _miniCalMonth = parseInt(d.slice(5,7), 10)
  renderMiniCal()
  const cal = document.getElementById('mini-cal')
  cal.classList.add('open')
  const rect = anchorEl.getBoundingClientRect()
  const calW = 216, calH = 240
  let top = rect.bottom + 6, left = rect.left
  if (left + calW > window.innerWidth - 8) left = window.innerWidth - calW - 8
  if (top + calH > window.innerHeight - 8) top = rect.top - calH - 4
  cal.style.top = top + 'px'
  cal.style.left = left + 'px'
}

function closeMiniCal() {
  document.getElementById('mini-cal').classList.remove('open')
  _miniCalMsId = null
}

function renderMiniCal() {
  const cal = document.getElementById('mini-cal')
  const ms = _miniCalMsId ? state.milestones.find(x => x.id === _miniCalMsId) : null
  const selectedDate = ms ? ms.date : null
  const todayStr = today()
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December']
  const firstDow = new Date(_miniCalYear, _miniCalMonth - 1, 1).getDay()
  const daysInMonth = new Date(_miniCalYear, _miniCalMonth, 0).getDate()
  const startOffset = (firstDow + 6) % 7
  const dows = ['Mo','Tu','We','Th','Fr','Sa','Su'].map(d => `<div class="mini-cal__dow">${d}</div>`).join('')
  let cells = Array.from({length: startOffset}, () => `<div class="mini-cal__day mini-cal__day--empty"></div>`).join('')
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${_miniCalYear}-${String(_miniCalMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const cls = ['mini-cal__day', ds === todayStr ? 'mini-cal__day--today' : '', ds === selectedDate ? 'mini-cal__day--selected' : ''].filter(Boolean).join(' ')
    cells += `<div class="${cls}" onclick="pickMiniCalDate('${ds}')">${d}</div>`
  }
  cal.innerHTML = `<div class="mini-cal__header"><button class="mini-cal__nav" onclick="shiftMiniCal(-1)">‹</button><span class="mini-cal__month">${MONTHS[_miniCalMonth-1]} ${_miniCalYear}</span><button class="mini-cal__nav" onclick="shiftMiniCal(1)">›</button></div><div class="mini-cal__grid">${dows}${cells}</div>`
}

function shiftMiniCal(dir) {
  _miniCalMonth += dir
  if (_miniCalMonth > 12) { _miniCalMonth = 1; _miniCalYear++ }
  if (_miniCalMonth < 1)  { _miniCalMonth = 12; _miniCalYear-- }
  renderMiniCal()
}

function pickMiniCalDate(dateStr) {
  if (!_miniCalMsId) return
  const ms = state.milestones.find(x => x.id === _miniCalMsId)
  if (!ms) return
  ms.date = dateStr
  closeMiniCal()
  save(); render()
}

document.addEventListener('click', e => {
  const cal = document.getElementById('mini-cal')
  if (cal && cal.classList.contains('open') && !cal.contains(e.target) && !e.target.classList.contains('ms-date-tag')) {
    closeMiniCal()
  }
}, true)

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeMiniCal()
})
</script>
<div id="mini-cal"></div>
</body>
